<!DOCTYPE html>
<html<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8" />

  <!-- Mobile-first responsive viewport (prevents zoom, fits notches) -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / native-feel meta tags so it behaves like an installed Play Store app -->
  <meta name="theme-color" content="#05070d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexus AI" />
  <meta name="application-name" content="Nexus AI" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="description" content="Nexus AI — your intelligent chat assistant." />

  <!-- App icon (Play Store / Add to Home Screen) -->
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Google fonts: Inter for UI text -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet" />

  <!-- Feather icon library (provides menu / mic / send / settings icons) -->
  <script src="https://unpkg.com/feather-icons" defer></script>

  <!-- External stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <title>Nexus AI</title>
</head>

<body>
  <!-- ============== APP SHELL ============== -->
  <div id="app" class="app-shell">

    <!-- ============== HEADER ============== -->
    <header class="app-header" role="banner">
      <!-- Brand / app name -->
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1 class="brand-name">Nexus AI</h1>
      </div>

      <!-- Settings button -->
      <button id="settings-btn"
              class="icon-btn"
              type="button"
              aria-label="Open settings">
        <i data-feather="settings" aria-hidden="true"></i>
      </button>
    </header>

    <!-- ============== CHAT AREA (scrollable) ============== -->
    <main id="chat-container"
          class="chat-container"
          role="main"
          aria-live="polite"
          aria-label="Conversation with Nexus AI">
      <!-- Chat messages are injected here by script.js -->
    </main>

    <!-- ============== BOTTOM INPUT BAR ============== -->
    <footer class="input-bar" role="contentinfo">
      <form id="composer" class="composer" autocomplete="off">

        <!-- Text input -->
        <label for="message-input" class="visually-hidden">Type your message</label>
        <input id="message-input"
               class="message-input"
               type="text"
               name="message"
               placeholder="Ask Nexus anything..."
               enterkeyhint="send"
               autocomplete="off"
               autocapitalize="sentences"
               spellcheck="true" />

        <!-- Microphone (voice input) -->
        <button id="mic-btn"
                class="icon-btn mic-btn"
                type="button"
                aria-label="Start voice input">
          <i data-feather="mic" aria-hidden="true"></i>
        </button>

        <!-- Send button -->
        <button id="send-btn"
                class="send-btn"
                type="submit"
                aria-label="Send message">
          <i data-feather="arrow-up" aria-hidden="true"></i>
        </button>

      </form>
    </footer>

  </div>

  <!-- External script -->
  <script src="script.js" defer></script>
</body>
        </html>
