<!-- ==========================================================================
     index.html — Nexus AI (Pro Multimodal)
     ========================================================================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="description" content="Nexus AI — your multimodal assistant." />
  <title>Nexus AI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Markdown + syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.5/dist/purify.min.js" defer></script>
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js" defer></script>

  <!-- Icons -->
  <script src="https://unpkg.com/feather-icons" defer></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <h1>Nexus AI</h1>
    </div>
    <div class="header-actions">
      <button id="tts-btn" class="icon-btn" type="button" aria-label="Toggle voice replies" aria-pressed="false" title="Voice replies">
        <i data-feather="volume-2"></i>
      </button>
      <button id="settings-btn" class="icon-btn" type="button" aria-label="Settings" title="Settings">
        <i data-feather="settings"></i>
      </button>
    </div>
  </header>

  <main id="chat-container" class="chat-container" aria-live="polite"></main>

  <form id="composer" class="composer" autocomplete="off">
    <button id="mic-btn" class="icon-btn mic" type="button" aria-label="Start voice input" title="Voice input">
      <i data-feather="mic"></i>
    </button>
    <input
      id="message-input"
      class="message-input"
      type="text"
      placeholder="Ask Nexus anything…"
      aria-label="Message"
      enterkeyhint="send"
      autocomplete="off"
    />
    <button id="send-btn" class="send-btn" type="submit" aria-label="Send message" disabled>
      <i data-feather="arrow-up"></i>
    </button>
  </form>

  <script src="script.js" defer></script>
</body>
</html>
