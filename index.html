<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adil Intelligence | v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="sidebar">
            <div class="nav-item active">💬</div>
            <div class="nav-item">⚙️</div>
        </div>

        <div class="app-core">
            <header class="top-nav">
                <div class="ai-branding">
                    <div class="pulse"></div>
                    <div>
                        <h2>ADIL AI <span class="badge">ULTRA</span></h2>
                        <small>Neural Network Active</small>
                    </div>
                </div>
            </header>

            <div class="chat-engine" id="chatArea">
                <div class="message-row ai">
                    <div class="avatar">AI</div>
                    <div class="bubble">System Online. Hello Adil, how can we revolutionize your project today?</div>
                </div>
            </div>

            <footer class="action-bar">
                <div class="input-pill">
                    <input type="text" id="userInp" placeholder="Type your command..." autocomplete="off">
                    <button id="sendBtn">✦</button>
                </div>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
